<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Beam Search Tree</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FAFBFF;font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;display:flex;justify-content:center;padding:24px 0}
.wrap{text-align:center;max-width:720px}
h1{font-size:20px;color:#111827;font-weight:700}
.sub{font-size:12px;color:#9CA3AF;margin:4px 0 14px}
.legend{display:flex;justify-content:center;gap:20px;margin-bottom:12px;font-size:12px;color:#374151}
.legend-item{display:flex;align-items:center;gap:5px}
.lsw{width:14px;height:14px;border-radius:3px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Beam Search Tree</h1>
  <p class="sub">点击左侧 Step 标签折叠/展开子树 · beam_width = 2 · CONN = [[0,1],[0,0],[0,1],[0,0]]</p>
  <div class="legend">
    <div class="legend-item"><div class="lsw" style="background:#FADBD8;border:1.5px solid #E74C3C"></div>Beam 0</div>
    <div class="legend-item"><div class="lsw" style="background:#D4E6F1;border:1.5px solid #3498DB"></div>Beam 1</div>
    <div class="legend-item"><div class="lsw" style="background:#F3F4F6;border:2px solid #374151"></div>共享祖先</div>
    <div class="legend-item"><div class="lsw" style="background:#F9FAFB;border:1.5px dashed #D1D5DB"></div><span style="color:#9CA3AF">Dead ✗</span></div>
  </div>
  <svg id="tree" width="660" height="590" viewBox="0 0 660 590">
    <defs>
      <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.06"/></filter>
      <marker id="a-shared" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0,0.7 6,3.5 0,6.3" fill="#374151"/></marker>
      <marker id="a-beam0" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0,0.7 6,3.5 0,6.3" fill="#E74C3C"/></marker>
      <marker id="a-beam1" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0,0.7 6,3.5 0,6.3" fill="#3498DB"/></marker>
    </defs>
    <g id="scene"></g>
  </svg>
</div>
<script>
'use strict';

const CONN = [[0,1],[0,0],[0,1],[0,0]], STEPS = 5;
const NW = 56, NH = 28, CW = 84, NR = 6;
const SY = [50, 140, 230, 320, 410, 500];

const nodes = [
  {id:'ctx',  label:'context', step:0, x:434, y:SY[0], w:CW, prob:1.0},
  {id:'s0t0', label:'s0t0', step:1, x:338, y:SY[1], w:NW, tok:[1,0], prob:0.600},
  {id:'s0t1', label:'s0t1', step:1, x:530, y:SY[1], w:NW, tok:[1,1], prob:0.300},
  {id:'s1t0', label:'s1t0', step:2, x:338, y:SY[2], w:NW, tok:[2,0], prob:0.420},
  {id:'s1t1', label:'s1t1', step:2, x:530, y:SY[2], w:NW, tok:[2,1], prob:0.240},
  {id:'s2t0', label:'s2t0', step:3, x:255, y:SY[3], w:NW, tok:[3,0], prob:0.210},
  {id:'s2t1', label:'s2t1', step:3, x:420, y:SY[3], w:NW, tok:[3,1], prob:0.168},
  {id:'s3t0', label:'s3t0', step:4, x:255, y:SY[4], w:NW, tok:[4,0], prob:0.126},
  {id:'s3t1', label:'s3t1', step:4, x:420, y:SY[4], w:NW, tok:[4,1], prob:0.084},
  {id:'s4t0', label:'s4t0', step:5, x:200, y:SY[5], w:NW, tok:[5,0], prob:0.063},
  {id:'s4t1', label:'s4t1', step:5, x:310, y:SY[5], w:NW, tok:[5,1], prob:0.050},
];

const edges = [
  ['ctx','s0t0'], ['ctx','s0t1'],
  ['s0t0','s1t0'], ['s0t1','s1t1'],
  ['s1t0','s2t0'], ['s1t0','s2t1'],
  ['s2t0','s3t0'], ['s2t1','s3t1'],
  ['s3t0','s4t0'], ['s3t0','s4t1'],
];

const NM = Object.fromEntries(nodes.map(n => [n.id, n]));

function bPath(depth, beam) {
  const p = []; let idx = beam;
  for (let k = depth; k >= 1; k--) {
    p.push([k, idx]);
    if (k >= 2) idx = CONN[k - 2][idx];
  }
  return p.reverse();
}

function nStat(step, tok, vd) {
  if (step === 0) return 'shared';
  if (step > vd) return 'hidden';
  const p0 = bPath(vd, 0), p1 = bPath(vd, 1);
  const i0 = p0.some(([s, t]) => s === step && t === tok);
  const i1 = p1.some(([s, t]) => s === step && t === tok);
  if (i0 && i1) return 'shared';
  if (i0) return 'beam0';
  if (i1) return 'beam1';
  return 'dead';
}

const COL = {
  shared: {f:'#F3F4F6', s:'#374151', t:'#1F2937', e:'#374151'},
  beam0:  {f:'#FADBD8', s:'#E74C3C', t:'#991B1B', e:'#E74C3C'},
  beam1:  {f:'#D4E6F1', s:'#3498DB', t:'#1E3A5F', e:'#3498DB'},
  dead:   {f:'#F9FAFB', s:'#D1D5DB', t:'#B0B0B0', e:'#E5E7EB'},
};

let vd = STEPS;
const sc = document.getElementById('scene'), ns = 'http://www.w3.org/2000/svg';

function mk(t, a, p) {
  const e = document.createElementNS(ns, t);
  for (const [k, v] of Object.entries(a || {})) e.setAttribute(k, v);
  if (p) p.appendChild(e);
  return e;
}

function render() {
  sc.innerHTML = '';

  for (let s = 0; s <= STEPS; s++) {
    mk('line', {
      x1: 115, y1: SY[s], x2: 640, y2: SY[s],
      stroke: '#E5E7EB', 'stroke-width': 1, 'stroke-dasharray': '4,4',
      opacity: s <= vd ? 0.25 : 0.06
    }, sc);
  }

  for (const [fid, tid] of edges) {
    const fn = NM[fid], tn = NM[tid];
    if (tn.step > vd) continue;
    const st = tn.tok ? nStat(tn.tok[0], tn.tok[1], vd) : 'shared';
    const c = COL[st] || COL.dead;
    const y1 = fn.y + NH / 2, y2 = tn.y - NH / 2, my = (y1 + y2) / 2;
    mk('path', {
      d: `M${fn.x},${y1} C${fn.x},${my} ${tn.x},${my} ${tn.x},${y2}`,
      fill: 'none', stroke: c.e,
      'stroke-width': st === 'dead' ? 1.2 : 2,
      'stroke-dasharray': st === 'dead' ? '5,3' : 'none',
      'marker-end': st !== 'dead' ? `url(#a-${st})` : ''
    }, sc);
  }

  for (const n of nodes) {
    let st;
    if (n.step === 0) st = 'shared';
    else if (n.step > vd) continue;
    else st = nStat(n.tok[0], n.tok[1], vd);
    const c = COL[st];
    const g = mk('g', {transform: `translate(${n.x - n.w / 2},${n.y - NH / 2})`, filter: 'url(#sh)'}, sc);

    mk('rect', {
      width: n.w, height: NH, rx: NR, fill: c.f, stroke: c.s,
      'stroke-width': st === 'shared' && n.step > 0 ? 2.2 : 1.5,
      'stroke-dasharray': st === 'dead' ? '4,2' : 'none'
    }, g);

    const fw = (st === 'shared' && n.step > 0) ? 700 : 500;
    mk('text', {
      x: n.w / 2, y: NH / 2 + 1,
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      fill: c.t, 'font-size': n.step === 0 ? 11 : 12, 'font-weight': fw,
      'font-family': "'SF Mono',Consolas,'Courier New',monospace"
    }, g).textContent = n.label;

    if (st === 'dead') {
      mk('text', {
        x: n.w + 6, y: NH / 2 + 1, 'dominant-baseline': 'middle',
        fill: '#DC2626', 'font-size': 14, 'font-weight': 700,
        'font-family': '-apple-system,sans-serif'
      }, g).textContent = '\u2717';
    }

    const probStr = n.prob >= 0.1 ? n.prob.toFixed(2) : n.prob.toFixed(3);
    const probColor = st === 'dead' ? '#C0C0C0' : c.t;
    mk('text', {
      x: n.w / 2, y: NH + 13,
      'text-anchor': 'middle', fill: probColor,
      'font-size': 10, 'font-weight': 500, opacity: st === 'dead' ? 0.6 : 0.8,
      'font-family': "'SF Mono',Consolas,'Courier New',monospace"
    }, g).textContent = `p=${probStr}`;
  }

  for (let s = 0; s <= STEPS; s++) {
    const vis = s <= vd;
    const isCutoff = s === vd && s < STEPS;
    const g = mk('g', {transform: `translate(8,${SY[s] - 14})`}, sc);

    mk('rect', {
      width: 98, height: 28, rx: 5,
      fill: isCutoff ? '#EEF2FF' : 'transparent',
      stroke: isCutoff ? '#C7D2FE' : 'none', 'stroke-width': 1
    }, g);

    if (s >= 1 && s <= STEPS - 1) {
      const arrow = s < vd ? '\u25BE' : '\u25B8';
      mk('text', {
        x: 7, y: 18, fill: vis ? '#6B7280' : '#D1D5DB',
        'font-size': 11, 'font-family': '-apple-system,sans-serif'
      }, g).textContent = arrow;
    }

    const lx = (s >= 1 && s <= STEPS - 1) ? 20 : 7;
    mk('text', {
      x: lx, y: 18, fill: vis ? '#374151' : '#D1D5DB',
      'font-size': 12, 'font-weight': 600,
      'font-family': '-apple-system,sans-serif'
    }, g).textContent = s === 0 ? 'Context' : `Step ${s}`;

    if (s >= 1) {
      g.style.cursor = 'pointer';
      const bg = g.querySelector('rect');
      g.addEventListener('mouseenter', () => bg.setAttribute('fill', '#EEF2FF'));
      g.addEventListener('mouseleave', () => {
        const cut = vd === s && s < STEPS;
        bg.setAttribute('fill', cut ? '#EEF2FF' : 'transparent');
        bg.setAttribute('stroke', cut ? '#C7D2FE' : 'none');
      });
      g.addEventListener('click', () => {
        vd = vd === s ? (s === STEPS ? s - 1 : STEPS) : s;
        render();
      });
    }
  }

  if (vd >= 1) {
    const p0 = bPath(vd, 0), p1 = bPath(vd, 1);
    const fmt = p => 'ctx \u2192 ' + p.map(([s, t]) => `s${s - 1}t${t}`).join(' \u2192 ');
    const ay = SY[vd] + 40;

    mk('text', {
      x: 130, y: ay, fill: '#E74C3C', 'font-size': 11, 'font-weight': 600,
      'font-family': "'SF Mono',Consolas,monospace"
    }, sc).textContent = `Beam 0: ${fmt(p0)}`;
    mk('text', {
      x: 130, y: ay + 17, fill: '#3498DB', 'font-size': 11, 'font-weight': 600,
      'font-family': "'SF Mono',Consolas,monospace"
    }, sc).textContent = `Beam 1: ${fmt(p1)}`;
  }
}

render();
</script>
</body>
</html>
