<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codex 指令速查表</title>
  <meta name="description" content="Codex CLI 指令、Slash 命令、常用参数速查，支持搜索与导出 PDF" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #2563eb;
      --green: #047857;
      --purple: #7c3aed;
      --amber: #b45309;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 18px;
      line-height: 1.4;
    }
    .wrap { max-width: 1400px; margin: 0 auto; }
    .crumb {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .crumb a { color: var(--blue); text-decoration: none; }
    .crumb a:hover { text-decoration: underline; }
    .topline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .topline a { color: var(--blue); text-decoration: none; }
    .topline a:hover { text-decoration: underline; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 12px;
    }
    h1 { font-size: 28px; line-height: 1.2; }
    .meta { font-size: 13px; color: var(--muted); text-align: right; }
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .toolbar input {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    .toolbar button {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #fff;
      font-size: 13px;
      padding: 9px 12px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #f1f5f9; }
    .stats {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    .section h2 {
      font-size: 15px;
      padding: 10px 12px;
      color: #fff;
    }
    .section.slash h2 { background: var(--purple); }
    .section.cli h2 { background: var(--green); }
    .section.flags h2 { background: var(--amber); }
    .rows { padding: 8px 10px; }
    .row {
      display: grid;
      grid-template-columns: 1.2fr 2fr;
      gap: 10px;
      padding: 7px 4px;
      border-bottom: 1px dashed #e2e8f0;
      font-size: 13px;
    }
    .row:last-child { border-bottom: none; }
    .k { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; color: #0b3b8c; }
    .v { color: #334155; }
    .hidden { display: none !important; }
    .note {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .hit {
      background: #fef3c7;
      border-radius: 4px;
      padding: 0 2px;
    }
    @media (max-width: 1100px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; }
      .meta { text-align: left; }
      .row { grid-template-columns: 1fr; gap: 4px; }
    }
    @media print {
      @page { size: A4 landscape; margin: 8mm; }
      body { padding: 0; background: #fff; }
      .crumb, .toolbar, .note { display: none !important; }
      .grid { gap: 8px; }
      .section { break-inside: avoid; }
      a { color: inherit; text-decoration: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="../">← 返回速查表合集</a></div>
    <div class="topline">
      官方参考：
      <a href="https://developers.openai.com/codex/cli/slash-commands/" target="_blank" rel="noopener noreferrer">Slash commands</a>
      ·
      <a href="https://developers.openai.com/codex/cli/reference/" target="_blank" rel="noopener noreferrer">CLI reference</a>
    </div>
    <div class="header">
      <h1>Codex 指令速查表</h1>
      <div class="meta">按 OpenAI Codex CLI 文档整理 · 可搜索 · 可导出 PDF</div>
    </div>
    <div class="toolbar">
      <input id="q" type="search" placeholder="搜索：/review、codex exec、--sandbox ..." />
      <button id="pdf" type="button">导出 PDF</button>
    </div>
    <div id="stats" class="stats">共 0 条</div>

    <div class="grid" id="grid"></div>

    <div class="note">
      说明：不同平台/版本/功能开关下，实际可见命令可能略有差异；请以你本机 `codex --help` 与 `/` 命令面板为准。
    </div>
  </div>

  <script>
    const DATA = {
      slash: [
        ["/permissions", "调整无需确认即可执行的能力范围"],
        ["/sandbox-add-read-dir", "Windows：给沙箱新增只读目录"],
        ["/agent", "切换/查看子线程（agent thread）"],
        ["/apps", "浏览 connectors 并插入 $app-slug"],
        ["/plugins", "浏览与管理插件"],
        ["/clear", "清空终端并开启新对话"],
        ["/compact", "压缩历史对话，释放上下文"],
        ["/copy", "复制最近一条完成回复（Ctrl+O）"],
        ["/diff", "查看工作区 diff（含未跟踪文件）"],
        ["/exit / /quit", "退出 Codex CLI"],
        ["/experimental", "切换实验特性开关"],
        ["/feedback", "提交日志/诊断给维护方"],
        ["/init", "生成 AGENTS.md 指南模板"],
        ["/logout", "退出登录"],
        ["/mcp", "列出 MCP tools / servers"],
        ["/mention", "快速附加文件或目录到上下文"],
        ["/model", "切模型（支持时可调 reasoning effort）"],
        ["/fast", "开关 Fast mode"],
        ["/plan", "进入 Plan 模式（可带提示）"],
        ["/personality", "切换表达风格（friendly/pragmatic/none）"],
        ["/ps", "查看后台终端任务状态"],
        ["/stop", "停止全部后台终端（/clean 别名）"],
        ["/fork", "从当前对话分叉新线程"],
        ["/resume", "恢复历史会话"],
        ["/new", "同一会话内开启新对话"],
        ["/review", "审查当前工作树改动"],
        ["/status", "查看模型/权限/令牌占用/上下文状态"],
        ["/debug-config", "打印配置层与策略诊断"],
        ["/statusline", "配置 TUI 底部状态栏字段"],
        ["/title", "配置终端标题字段"]
      ],
      cli: [
        ["codex", "启动交互式 TUI（可带初始 prompt）"],
        ["codex exec (codex e)", "无头执行，输出到 stdout/JSONL"],
        ["codex resume", "恢复最近或指定会话"],
        ["codex fork", "基于已有会话分叉新线程"],
        ["codex login", "登录（OAuth / device / API key）"],
        ["codex logout", "清除本地认证"],
        ["codex apply (codex a)", "应用最近 cloud 任务 patch 到本地"],
        ["codex cloud", "在终端浏览/执行 cloud tasks"],
        ["codex features", "查看与持久化 feature flags"],
        ["codex completion", "生成 shell 自动补全脚本"],
        ["codex mcp", "管理 MCP servers（add/remove/auth）"],
        ["codex mcp-server", "将 Codex 作为 MCP server 运行"],
        ["codex plugin marketplace", "插件市场源管理"],
        ["codex app", "打开桌面 App（macOS/Windows）"],
        ["codex app-server", "本地 app server（实验）"],
        ["codex sandbox", "沙箱策略相关子命令（实验）"],
        ["codex execpolicy", "评估 execpolicy 规则（实验）"]
      ],
      flags: [
        ["-m, --model", "指定模型（覆盖配置）"],
        ["-i, --image", "给初始请求附图（可重复）"],
        ["-s, --sandbox", "read-only/workspace-write/danger-full-access"],
        ["-a, --ask-for-approval", "untrusted/on-request/never"],
        ["--full-auto", "快捷组合：on-request + workspace-write"],
        ["--yolo", "跳过审批与沙箱（高风险）"],
        ["-C, --cd", "启动前切换工作目录"],
        ["--search", "实时网络搜索（live）"],
        ["--add-dir", "增加额外可写目录"],
        ["--profile", "加载 config.toml 中指定 profile"],
        ["--config, -c", "覆盖配置键值（key=value）"],
        ["--enable / --disable", "启用或禁用特性开关"],
        ["--remote", "连接远端 app-server（ws/wss）"],
        ["--remote-auth-token-env", "远端连接时从环境变量取 token"],
        ["--no-alt-screen", "禁用 TUI alternate screen"],
        ["--oss", "使用本地 OSS provider（需 Ollama）"]
      ]
    };

    const SECTIONS = [
      { key: "slash", title: "Slash 命令", cls: "slash" },
      { key: "cli", title: "CLI 子命令", cls: "cli" },
      { key: "flags", title: "启动参数", cls: "flags" }
    ];

    const grid = document.getElementById("grid");
    const input = document.getElementById("q");
    const stats = document.getElementById("stats");
    document.getElementById("pdf").addEventListener("click", () => window.print());

    function escapeHtml(text) {
      return text.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" }[c]));
    }

    function highlight(text, q) {
      if (!q) return escapeHtml(text);
      const lower = text.toLowerCase();
      const qLower = q.toLowerCase();
      const idx = lower.indexOf(qLower);
      if (idx < 0) return escapeHtml(text);
      const a = escapeHtml(text.slice(0, idx));
      const b = escapeHtml(text.slice(idx, idx + q.length));
      const c = escapeHtml(text.slice(idx + q.length));
      return a + '<span class="hit">' + b + "</span>" + c;
    }

    function render() {
      const q = input.value.trim();
      let total = 0;
      grid.innerHTML = "";

      for (const sec of SECTIONS) {
        const rows = DATA[sec.key]
          .filter(([k, v]) => {
            if (!q) return true;
            const s = (k + " " + v).toLowerCase();
            return s.includes(q.toLowerCase());
          });
        total += rows.length;

        const section = document.createElement("section");
        section.className = "section " + sec.cls + (rows.length ? "" : " hidden");
        section.innerHTML =
          '<h2>' + sec.title + '</h2>' +
          '<div class="rows">' +
          rows.map(([k, v]) => (
            '<div class="row"><div class="k">' + highlight(k, q) + '</div><div class="v">' + highlight(v, q) + '</div></div>'
          )).join("") +
          '</div>';
        grid.appendChild(section);
      }

      stats.textContent = "当前显示 " + total + " 条";
    }

    input.addEventListener("input", render);
    render();
  </script>
</body>
</html>
