<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>速查表合集 · Visualizations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f5f7;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 60px;
    }
    .crumb {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
      width: 100%;
      max-width: 720px;
    }
    .crumb a { color: #2563eb; text-decoration: none; }
    .crumb a:hover { text-decoration: underline; }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
      width: 100%;
      max-width: 720px;
    }
    .sub {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      width: 100%;
      max-width: 720px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 720px;
    }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 26px 22px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      transform: translateY(-2px);
    }
    .card h2 {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .card p {
      font-size: 13px;
      line-height: 1.6;
      color: #666;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 10px;
      background: #ede9fe;
      color: #5b21b6;
    }
    footer {
      margin-top: auto;
      padding-top: 48px;
      font-size: 11px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <nav class="crumb"><a href="../">← 项目首页</a></nav>
  <h1>速查表合集</h1>
  <p class="sub">Cheatsheets · 可打印 / 模糊搜索</p>
  <div class="cards">
    <a class="card" href="claude-code/">
      <span class="tag">Claude Code</span>
      <h2>Claude Code 速查表</h2>
      <p>快捷键、Slash、MCP、CLI、配置与 Skills；布局对齐 cc.jiangrzc.cn；支持模糊搜索与导出 PDF。</p>
    </a>
  </div>
  <footer>GitHub Pages · JacoCheung/visualization</footer>
</body>
</html>
