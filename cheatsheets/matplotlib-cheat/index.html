<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matplotlib Cheat Sheet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      padding: 18px;
    }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .crumb { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .crumb a { color: #2563eb; text-decoration: none; }
    h1 { font-size: 24px; margin-bottom: 6px; }
    .sub { color: #475569; font-size: 13px; margin-bottom: 10px; }
    .viewer {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      min-height: 680px;
      margin-bottom: 12px;
    }
    object { width: 100%; display: block; border: 0; }
    .viewer.p1 object { height: 845px; }
    .viewer.p2 object { height: 845px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="../">← 返回速查表合集</a></div>
    <h1>Matplotlib Cheat Sheet（SVG 重绘）</h1>
    <div class="sub">按原 PDF 页面转成 SVG，并叠加可选中文本层（可复制粘贴）。</div>
    <div class="viewer p1">
      <object data="./page-1.svg" type="image/svg+xml"></object>
    </div>
    <div class="viewer p2">
      <object data="./page-2.svg" type="image/svg+xml"></object>
    </div>
  </div>
</body>
</html>
