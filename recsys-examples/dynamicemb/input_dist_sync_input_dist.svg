  <rect x="774" y="600" width="12" height="330" rx="2" fill="#BFDBFE" opacity="0.4"/>

  <!-- ===== Step 1: Pipeline &#x2192; ShardedDynEmb ===== -->
  <line x1="116" y1="140" x2="324" y2="140" stroke="#1F2937" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="130" y="134" class="mono" fill="#1F2937">_start_sparse_data_dist(batch_ip2)</text>

