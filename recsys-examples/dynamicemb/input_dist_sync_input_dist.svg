  <text x="1020" y="494" text-anchor="middle" font-size="9" fill="#6B7280">GPU kernel</text>

  <!-- Step 10: bucketized KJT note -->
  <rect x="570" y="510" width="340" height="22" rx="4" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="580" y="525" class="note" fill="#92400E">&#x2192; bucketized KJT: 8 keys (1 feat &#xD7; 8 ranks)</text>

  <!-- Step 11: &#x2192; KJTAllToAll -->
  <line x1="566" y1="555" x2="774" y2="555" stroke="#1F2937" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="575" y="549" class="mono" fill="#1F2937">self._dist(bucketized_features)</text>

  <!-- Step 12: dist_splits(splits) self-call -->
  <path d="M786,580 L830,580 L830,595 L786,595" fill="none" stroke="#1F2937" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="840" y="590" class="mono" fill="#1F2937">bucketized_kjt.dist_splits(splits)</text>

  <!-- ===== &#x2605; D2H #2 ===== -->
  <rect x="738" y="610" width="320" height="58" rx="5" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <rect x="738" y="610" width="26" height="16" rx="4" fill="#DC2626"/>
  <text x="751" y="622" text-anchor="middle" class="sn" fill="#fff">D2</text>
  <text x="778" y="625" class="nbold" fill="#991B1B">&#x2605; D2H #2: 64B &#x2014; length_per_key().tolist()</text>
  <line x1="1014" y1="640" x2="786" y2="640" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="798" y="660" class="mono" fill="#991B1B">torch.sum(lengths.view(8,stride),1).tolist()</text>
  <a href="https://github.com/shijieliu/recsys-examples/blob/47cffb400c7e8d70dd82d7e61c290ede576d4501/third_party/torchrec/torchrec/sparse/jagged_tensor.py#L1165" target="_blank">
  <text x="838" y="678" class="link">jagged_tensor.py:1165</text>
</a>

  <!-- ===== &#x25B2; H2D #2 ===== -->
  <rect x="738" y="695" width="320" height="30" rx="4" fill="#EFF6FF" stroke="#93C5FD"/>
  <rect x="738" y="695" width="26" height="16" rx="4" fill="#2563EB"/>
  <text x="751" y="707" text-anchor="middle" class="sn" fill="#fff">H2</text>
  <line x1="786" y1="710" x2="1014" y2="710" stroke="#2563EB" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="798" y="720" class="mono" fill="#1E40AF">torch.tensor(batch_size_per_split, cuda) 64B</text>

  <!-- ===== &#x25B2; H2D #3 ===== -->
  <rect x="738" y="732" width="320" height="30" rx="4" fill="#EFF6FF" stroke="#93C5FD"/>
  <rect x="738" y="732" width="26" height="16" rx="4" fill="#2563EB"/>
  <text x="751" y="744" text-anchor="middle" class="sn" fill="#fff">H3</text>
  <line x1="786" y1="748" x2="1014" y2="748" stroke="#2563EB" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="798" y="758" class="mono" fill="#1E40AF">torch.tensor(length_per_split, cuda)   64B</text>

  <!-- ===== &#x25B2; H2D #4 ===== -->
  <rect x="738" y="770" width="320" height="30" rx="4" fill="#EFF6FF" stroke="#93C5FD"/>
  <rect x="738" y="770" width="26" height="16" rx="4" fill="#2563EB"/>
  <text x="751" y="782" text-anchor="middle" class="sn" fill="#fff">H4</text>
  <line x1="786" y1="786" x2="1014" y2="786" stroke="#2563EB" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="798" y="796" class="mono" fill="#1E40AF">torch.tensor([stride]&#xD7;8, cuda)         64B</text>

  <a href="https://github.com/shijieliu/recsys-examples/blob/47cffb400c7e8d70dd82d7e61c290ede576d4501/third_party/torchrec/torchrec/distributed/dist_data.py" target="_blank">
  <text x="1070" y="745" class="link">torchrec/dist_data.py</text>
</a>

  <!-- Step: SplitsAllToAllAwaitable.__init__ -->
  <line x1="786" y1="830" x2="1014" y2="830" stroke="#1F2937" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="798" y="824" class="mono" fill="#374151">torch.stack(splits_tensors).flatten()</text>

  <!-- Step: AllToAll #1 async launch -->
  <line x1="786" y1="860" x2="1234" y2="860" stroke="#059669" stroke-width="1.8" marker-end="url(#ag)"/>
  <text x="798" y="854" class="mono" fill="#059669">all_to_all_single(splits, async_op=True)</text>

  <rect x="1130" y="865" width="220" height="38" rx="4" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="1140" y="882" class="nbold" fill="#065F46">AllToAll #1 launched async</text>
  <text x="1140" y="896" class="note" fill="#6B7280">exchange splits metadata, non-blocking</text>

  <!-- Return arrows -->
  <line x1="774" y1="930" x2="566" y2="930" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="610" y="924" class="note" fill="#9CA3AF">KJTListSplitsAwaitable</text>
  <line x1="554" y1="945" x2="336" y2="945" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <line x1="324" y1="960" x2="116" y2="960" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="135" y="954" class="note" fill="#9CA3AF">&#x2192; _fuse_input_dist_splits(ctx)</text>

  <!-- Legend -->
  <rect x="20" y="980" width="14" height="14" rx="3" fill="#FEF2F2" stroke="#DC2626"/>
