  <path d="M336,210 L380,210 L380,225 L336,225" fill="none" stroke="#1F2937" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="392" y="220" class="mono" fill="#1F2937">_dedup_indices(ctx, features_by_shards)</text>

  <line x1="336" y1="250" x2="1014" y2="250" stroke="#1F2937" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="440" y="244" class="mono" fill="#374151">segmented_unique_cuda(indices, table_ids)</text>

  <!-- ===== &#x2605; D2H #1 ===== -->
  <rect x="298" y="280" width="760" height="58" rx="5" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <rect x="298" y="280" width="26" height="16" rx="4" fill="#DC2626"/>
  <text x="311" y="292" text-anchor="middle" class="sn" fill="#fff">D1</text>
  <text x="338" y="295" class="nbold" fill="#991B1B">&#x2605; D2H #1: 8 bytes &#x2014; num_uniques.item()</text>
  <line x1="1014" y1="308" x2="336" y2="308" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="440" y="318" class="mono" fill="#991B1B">total_unique = num_uniques.item() &#x2192; CPU stall ~11.8&#x3BC;s</text>
  <a href="https://github.com/shijieliu/recsys-examples/blob/47cffb400c7e8d70dd82d7e61c290ede576d4501/corelib/dynamicemb/dynamicemb/shard/embedding.py#L255" target="_blank">
  <text x="338" y="332" class="link">shard/embedding.py:255</text>
</a>

  <!-- Step 5: unique_keys slice -->
  <text x="344" y="363" class="mono" fill="#374151">unique_keys = unique_keys[:total_unique]</text>

  <!-- Step 6: &#x2192; RwSparseFeaturesDist.forward -->
  <line x1="336" y1="385" x2="554" y2="385" stroke="#1F2937" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="350" y="379" class="mono" fill="#1F2937">forward(dedup_features)</text>

  <!-- ===== &#x25B2; H2D #1 ===== -->
  <rect x="518" y="405" width="540" height="48" rx="5" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="518" y="405" width="26" height="16" rx="4" fill="#2563EB"/>
  <text x="531" y="417" text-anchor="middle" class="sn" fill="#fff">H1</text>
  <text x="558" y="420" class="nbold" fill="#1E40AF">&#x25B2; H2D #1: ~4B &#x2014; dist_type tensor (int32)</text>
  <line x1="566" y1="432" x2="1014" y2="432" stroke="#2563EB" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="580" y="446" class="mono" fill="#1E40AF">torch.tensor(dist_type_list, device=cuda)</text>
  <a href="https://github.com/shijieliu/recsys-examples/blob/47cffb400c7e8d70dd82d7e61c290ede576d4501/corelib/dynamicemb/dynamicemb/input_dist.py#L128" target="_blank">
  <text x="900" y="446" class="link">input_dist.py:128</text>
</a>

  <!-- Step 8: block_bucketize -->
  <line x1="566" y1="475" x2="1014" y2="475" stroke="#1F2937" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="580" y="469" class="mono" fill="#374151">block_bucketize_sparse_features()</text>
  <a href="https://github.com/shijieliu/recsys-examples/blob/47cffb400c7e8d70dd82d7e61c290ede576d4501/corelib/dynamicemb/dynamicemb/input_dist.py#L138" target="_blank">
  <text x="900" y="469" class="link">input_dist.py:138</text>
</a>

