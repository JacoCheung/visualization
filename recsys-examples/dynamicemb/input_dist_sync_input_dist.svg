    <text x="780" y="78" text-anchor="middle" class="ptcp" fill="#1E40AF">KJTAllToAll</text>
    <text x="780" y="93" text-anchor="middle" class="psub">SplitsAwaitable()</text>

    <rect x="920" y="60" width="200" height="44" rx="6" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.5"/>
    <text x="1020" y="78" text-anchor="middle" class="ptcp" fill="#374151">GPU</text>
    <text x="1020" y="93" text-anchor="middle" class="psub">data_dist_stream</text>

