  <rect x="180" y="980" width="14" height="14" rx="3" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="200" y="991" class="note" fill="#1E40AF">&#x25B2; H2D (CPU &#x2192; GPU)</text>
  <rect x="350" y="980" width="14" height="14" rx="3" fill="#ECFDF5" stroke="#059669"/>
  <text x="370" y="991" class="note" fill="#065F46">NCCL AllToAll (async)</text>
