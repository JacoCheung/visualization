  <rect width="1000" height="1300" fill="#FAFBFF"/>

  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">## input_dist ## &#x2014; DynamicEmb + RW Sharding</text>
  <text x="500" y="46" text-anchor="middle" font-size="11" fill="#9CA3AF">6 &#xD7; cudaMemcpyAsync (2 D2H &#x2605; + 4 H2D &#x25B2;)</text>

  <!-- ===== PARTICIPANTS x: 70 210 350 490 630 770 910 ===== -->
  <g filter="url(#sh)">
    <a href="https://github.com/pytorch/torchrec/blob/0a08dd559c1c72245e8aedd283a7782fe1907a3a/torchrec/distributed/train_pipeline/train_pipelines.py#L460" target="_blank">
    <rect x="10"  y="60" width="120" height="44" rx="6" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="70" y="78" text-anchor="middle" class="ptcp" fill="#4338CA">Pipeline</text>
    <text x="70" y="93" text-anchor="middle" class="psub">.progress()</text>
    </a>

    <a href="https://github.com/shijieliu/recsys-examples/blob/47cffb400c7e8d70dd82d7e61c290ede576d4501/corelib/dynamicemb/dynamicemb/shard/embedding.py#L73" target="_blank">
    <rect x="150" y="60" width="120" height="44" rx="6" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
