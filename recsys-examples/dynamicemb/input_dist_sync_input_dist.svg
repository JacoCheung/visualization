<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1020" viewBox="0 0 1440 1020">
  <defs>
    <style>
      text{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
      .mono{font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:11px}
      .ptcp{font-size:12px;font-weight:700}
      .psub{font-size:9.5px;fill:#6B7280}
      .msg{font-size:11px;fill:#1F2937}
      .note{font-size:10.5px}
      .nbold{font-size:10.5px;font-weight:600}
      .sn{font-size:10px;font-weight:700}
      .link{font-family:'SF Mono',Consolas,monospace;font-size:9.5px;fill:#7C3AED;text-decoration:underline;cursor:pointer}
    </style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,1 7,4 0,7" fill="#1F2937"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,1 7,4 0,7" fill="#9CA3AF"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,1 7,4 0,7" fill="#059669"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="1440" height="1020" fill="#FAFBFF"/>

  <!-- Title -->
  <text x="720" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">## input_dist ## &#x2014; DynamicEmb + RW Sharding</text>
  <text x="720" y="46" text-anchor="middle" font-size="11" fill="#9CA3AF">6 &#xD7; cudaMemcpyAsync (2 D2H &#x2605; + 4 H2D &#x25B2;) &#xB7; PID 5194, Step 53</text>

  <!-- ===== PARTICIPANTS x: 110 330 560 780 1020 1240 ===== -->
  <g filter="url(#sh)">
    <rect x="30"  y="60" width="160" height="44" rx="6" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="110" y="78" text-anchor="middle" class="ptcp" fill="#4338CA">Pipeline</text>
    <text x="110" y="93" text-anchor="middle" class="psub">.progress()</text>

    <rect x="240" y="60" width="180" height="44" rx="6" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="330" y="78" text-anchor="middle" class="ptcp" fill="#0F766E">ShardedDynEmb</text>
    <text x="330" y="93" text-anchor="middle" class="psub">Collection.input_dist()</text>

    <rect x="470" y="60" width="180" height="44" rx="6" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5"/>
    <text x="560" y="78" text-anchor="middle" class="ptcp" fill="#92400E">RwSparseFeatDist</text>
    <text x="560" y="93" text-anchor="middle" class="psub">.forward()</text>

