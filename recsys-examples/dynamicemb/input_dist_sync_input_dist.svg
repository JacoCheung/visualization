  <line x1="336" y1="170" x2="1014" y2="170" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="440" y="164" class="note" fill="#6B7280">wait_stream(memcpy_stream) &#x2014; ensure batch H2D done</text>

