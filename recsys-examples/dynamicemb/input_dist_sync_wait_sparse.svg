  <rect width="1440" height="1020" fill="#FAFBFF"/>

  <!-- Title -->
  <text x="720" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">## wait_sparse_data_dist ## &#x2014; Two sub-stages (rewritten by train_pipeline)</text>
