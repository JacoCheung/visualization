<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="850" height="740" viewBox="0 0 850 740">
  <defs>
    <style>
      text{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
      .mono{font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:11px}
      .ptcp{font-size:12px;font-weight:700}
      .psub{font-size:9.5px;fill:#6B7280}
      .note{font-size:10.5px}
      .nbold{font-size:10.5px;font-weight:600}
      .sn{font-size:10px;font-weight:700}
      .link{font-family:'SF Mono',Consolas,monospace;font-size:9.5px;fill:#7C3AED;text-decoration:underline;cursor:pointer}
    </style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,1 7,4 0,7" fill="#1F2937"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,1 7,4 0,7" fill="#9CA3AF"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,1 7,4 0,7" fill="#059669"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="850" height="740" fill="#FAFBFF"/>

  <!-- Title -->
  <text x="425" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">## output_dist ## &#x2014; RW Sequence Sharding</text>
  <text x="425" y="46" text-anchor="middle" font-size="11" fill="#9CA3AF">1 &#xD7; NCCL AllToAll (all_to_all_single, async_op=True) &#xB7; 0 D2H / 0 H2D</text>

  <!-- ===== PARTICIPANTS x: 70 210 350 490 630 770 ===== -->
  <g filter="url(#sh)">
    <a href="https://github.com/pytorch/torchrec/blob/0a08dd559c1c72245e8aedd283a7782fe1907a3a/torchrec/distributed/train_pipeline/train_pipelines.py#L460" target="_blank">
    <rect x="10"  y="60" width="120" height="44" rx="6" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="70" y="78" text-anchor="middle" class="ptcp" fill="#4338CA">Pipeline</text>
    <text x="70" y="93" text-anchor="middle" class="psub">compute_and_output_dist</text>
    </a>

    <a href="https://github.com/pytorch/torchrec/blob/0a08dd559c1c72245e8aedd283a7782fe1907a3a/torchrec/distributed/sharding/rw_sequence_sharding.py#L56" target="_blank">
    <rect x="150" y="60" width="120" height="44" rx="6" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="210" y="78" text-anchor="middle" class="ptcp" fill="#0F766E">RwSequence</text>
    <text x="210" y="93" text-anchor="middle" class="psub">EmbeddingDist</text>
    </a>

    <a href="https://github.com/pytorch/torchrec/blob/0a08dd559c1c72245e8aedd283a7782fe1907a3a/torchrec/distributed/dist_data.py#L1496" target="_blank">
    <rect x="290" y="60" width="120" height="44" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="350" y="78" text-anchor="middle" class="ptcp" fill="#1E40AF">SequenceEmbs</text>
    <text x="350" y="93" text-anchor="middle" class="psub">AllToAll</text>
    </a>

    <a href="https://github.com/pytorch/torchrec/blob/0a08dd559c1c72245e8aedd283a7782fe1907a3a/torchrec/distributed/dist_data.py#L1454" target="_blank">
    <rect x="430" y="60" width="120" height="44" rx="6" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5"/>
    <text x="490" y="78" text-anchor="middle" class="ptcp" fill="#92400E">SequenceEmbs</text>
    <text x="490" y="93" text-anchor="middle" class="psub">Awaitable</text>
    </a>

    <rect x="570" y="60" width="120" height="44" rx="6" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.5"/>
    <text x="630" y="78" text-anchor="middle" class="ptcp" fill="#374151">GPU</text>
    <text x="630" y="93" text-anchor="middle" class="psub">default_stream</text>

    <rect x="710" y="60" width="120" height="44" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="770" y="78" text-anchor="middle" class="ptcp" fill="#065F46">NCCL</text>
    <text x="770" y="93" text-anchor="middle" class="psub">AllToAll</text>
